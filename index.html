<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>農業科技觀測站</title>
</head>
<body>
<style>
:root{--bg:#f7f8f6;--card:#fff;--ink:#1f2a22;--sub:#5c6b5f;--line:#e2e7de;
  --accent:#2f7d4f;--accent-ink:#fff;--tag:#eef4ee;--warn:#b25a00;}
@media (prefers-color-scheme:dark){:root{--bg:#151a16;--card:#1e251f;--ink:#e8efe8;--sub:#9fb0a2;
  --line:#2c352d;--accent:#4faa72;--accent-ink:#0c110d;--tag:#26302a;--warn:#e0a458;}}
:root[data-theme="light"]{--bg:#f7f8f6;--card:#fff;--ink:#1f2a22;--sub:#5c6b5f;--line:#e2e7de;
  --accent:#2f7d4f;--accent-ink:#fff;--tag:#eef4ee;--warn:#b25a00;}
:root[data-theme="dark"]{--bg:#151a16;--card:#1e251f;--ink:#e8efe8;--sub:#9fb0a2;
  --line:#2c352d;--accent:#4faa72;--accent-ink:#0c110d;--tag:#26302a;--warn:#e0a458;}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;line-height:1.75;}
a{color:inherit;}
header{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;}
.bar{max-width:1000px;margin:0 auto;padding:14px 20px;display:flex;flex-wrap:wrap;gap:12px 18px;align-items:center;}
.brand{font-weight:800;font-size:19px;text-decoration:none;margin-right:auto;cursor:pointer;}
.brand small{font-weight:500;color:var(--sub);font-size:12px;margin-left:8px;}
nav a{color:var(--sub);text-decoration:none;font-size:14px;padding:4px 2px;cursor:pointer;border-bottom:2px solid transparent;}
nav a:hover{color:var(--ink);}
.search{display:flex;gap:6px;}
.search input{padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);}
.search button{padding:6px 12px;border:0;border-radius:8px;background:var(--accent);color:var(--accent-ink);cursor:pointer;font-size:14px;}
main{max-width:1000px;margin:0 auto;padding:26px 20px 60px;}
h1{font-size:26px;margin:0 0 6px;text-wrap:balance;}
h2{font-size:19px;margin:26px 0 10px;}
.lead{color:var(--sub);margin:0 0 20px;max-width:60ch;}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin:0 0 14px;}
.card h3{margin:0 0 6px;font-size:17px;}
.card h3 a{text-decoration:none;cursor:pointer;}
.card h3 a:hover{color:var(--accent);}
.meta{font-size:12.5px;color:var(--sub);display:flex;flex-wrap:wrap;gap:6px 12px;margin:6px 0;}
.tag{display:inline-block;background:var(--tag);color:var(--sub);border-radius:999px;padding:2px 10px;font-size:12px;text-decoration:none;cursor:pointer;margin:2px 4px 2px 0;}
.tag:hover{color:var(--ink);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.article{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:26px 30px;}
.article p{white-space:pre-wrap;}
.article img.hero{width:100%;max-height:420px;object-fit:cover;border-radius:10px;margin:0 0 18px;}
.src{font-size:13px;color:var(--sub);border-top:1px solid var(--line);margin-top:20px;padding-top:14px;}
.empty{color:var(--sub);padding:30px 0;text-align:center;}
footer{max-width:1000px;margin:0 auto;padding:20px;color:var(--sub);font-size:12.5px;border-top:1px solid var(--line);}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
</style>

<header><div class="bar">
  <a class="brand" onclick="go('#/')">農業科技觀測站 <small>國際農業科技情報</small></a>
  <nav>
    <a onclick="go('#/')">首頁</a>
    <a onclick="go('#/latest')">最新文章</a>
    <a onclick="go('#/topics')">主題分類</a>
  </nav>
  <form class="search" onsubmit="return doSearch(event)">
    <input id="q" placeholder="關鍵字搜尋…" aria-label="搜尋">
    <button>搜尋</button>
  </form>
</div></header>
<main id="app"></main>
<footer>農業科技觀測站 · 為個人研究與內容經營用途。<br>
公開內容經人工複查後發布，聯絡信箱：clhuang.tarm@gmail.com。</footer>

<script>
const DATA = [{"id": 53, "public_title": "把水稻帶回夏威夷：日本品種以節水旱作，三個月收成優質稻米", "public_summary": "國際研究團隊在夏威夷可愛島以節水的旱作方式，成功種出優質日本稻米品種，成熟期較一般縮短約一個月，為當地糧食安全與水稻復耕提供新選項。", "public_article": "【範例說明】本文為系統 demo，僅依原始來源之摘要撰寫，尚未取得全文，數字與細節以文末原始網址為準。正式版 1,200–2,000 字文章應由使用者取全文後於 ChatGPT 完成並複查。\n\n一支國際研究團隊在美國夏威夷可愛島（Kauaʻi），以節水的旱作（upland）栽培方式，成功種植優質日本稻米品種，稻米約在三個月內成熟，較一般栽培縮短約一個月。研究團隊將此視為提升當地糧食安全、並探索讓水稻重回夏威夷的重要一步。\n\n【核心內容】\n此研究的兩個重點，一是採用日本優質稻米品種，二是使用節水的旱作方法。旱作水稻不採傳統淹灌，對水資源利用較友善，這在水資源有限或用水成本高的地區特別有意義。成熟期縮短，也意味著在同樣一段時間內有機會提高栽培彈性。\n\n【目前發展階段】\n本則來源為專業媒體 Phys.org 對研究成果的報導。具體的產量、品質指標、灌溉節水幅度與可推廣性，需回查原始報導與研究團隊發表的資料，本文不逕行推斷。\n\n【對臺灣的啟示】\n臺灣為稻作大宗地區，近年在缺水年份多次面臨灌區輪作與停灌休耕的調適壓力。節水旱作水稻的技術路線，理論上與臺灣因應乾旱、降低農業用水的方向相關，可能涉及農業部、農業試驗所與各區農業改良場的品種與栽培試驗。但品種適地性、稻米品質與市場接受度，都需在地驗證，不宜直接套用國外成果。此議題適合作為氣候調適與節水農業的持續追蹤題目。", "public_date": "2026-07-11", "published_date": "2026-07-06", "public_image_url": "", "topic": "H_農食系統與公共治理", "country": "美國", "language": "英文", "source_org": "Phys.org 農業", "title_original": "Bringing rice back to Hawaiʻi: Japanese cultivars yield high-quality grains in just three months", "url": "https://phys.org/news/2026-07-rice-hawaii-japanese-cultivars-yield.html"}, {"id": 59, "public_title": "德國 Stenon 募得 2,050 萬美元，用土壤數據平台對抗肥料漲價", "public_summary": "德國農業科技公司 Stenon 完成新一輪募資，主打即時氮素與土壤數據平台，協助農民在肥料成本上升下，建立對土壤生產力的長期判讀。", "public_article": "【範例說明】本文為系統 demo，僅依原始來源之摘要撰寫，尚未取得全文，數字與細節以文末原始網址為準。正式版 1,200–2,000 字文章應由使用者取全文後於 ChatGPT 完成並複查。\n\n德國農業科技公司 Stenon 近日宣布募得 2,050 萬美元，將資金投入其氮素與土壤數據平台的發展。根據原始報導，該平台的核心目標，是協助農民在肥料價格上升的壓力下，建立對土壤生產力更長期的判讀，而不只是單次施肥的短期決策。\n\n【核心內容】\nStenon 的定位是「即時土壤數據」。傳統土壤檢測需要採樣送驗、等待數日甚至數週，對於施肥時機的即時調整幫助有限。以感測與數據平台取得田間即時的氮素與土壤資訊，讓施肥決策可以更貼近作物與土壤當下的狀態，是這類技術主張的價值所在。\n\n在肥料價格波動、氮肥成本占生產成本比重升高的背景下，「用數據把每一分肥料用在對的地方」成為降低成本與減少環境負荷的共同訴求。這也呼應近年各國推動的精準施肥與農業減碳方向。\n\n【目前發展階段】\n本則屬企業募資與產品發展消息，來源為專業媒體 AgFunderNews（來源分級第二級）。具體的技術規格、田間驗證數據與商業化規模，需回查原始報導與該公司公開資料，本文不逕行推斷。\n\n【對臺灣的啟示】\n臺灣同樣面臨肥料進口成本波動，且長期推動合理化施肥與土壤肥力管理。即時土壤數據平台若要在臺灣導入，可能涉及農業部與農業試驗改良場所在土壤檢測體系的銜接，以及小農田區破碎、單位面積建置成本較高的限制。值得持續觀察其田間驗證成效，作為臺灣精準施肥政策與相關輔導計畫的參考案例。", "public_date": "2026-07-11", "published_date": "2026-07-01", "public_image_url": "https://upload.wikimedia.org/wikipedia/commons/1/12/Wheat_close-up.JPG", "topic": "A_智慧農業與資料治理", "country": "德國", "language": "英文", "source_org": "AgFunder News", "title_original": "Stenon bags $20.5m to combat fertilizer price hikes with better nitrogen management", "url": "https://agfundernews.com/stenon-bags-20-5m-to-combat-fertilizer-price-hikes-with-better-nitrogen-management"}];
const LABELS = {"A_智慧農業與資料治理": "智慧農業與資料治理", "B_氣候韌性與農業風險管理": "氣候韌性與風險管理", "C_IPM植物健康與農藥減量": "IPM與農藥減量", "D_森林木竹及林下經濟": "森林木竹與林下經濟", "E_低碳農業土壤與循環生物經濟": "低碳農業與循環生物經濟", "F_冷鏈食安與農食供應鏈": "冷鏈食安與供應鏈", "G_農村產業創新與六級產業化": "農村產業與六級產業化", "H_農食系統與公共治理": "農食系統與公共治理", "I_栽培管理": "栽培管理"};
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const label = t => LABELS[t] || t || '未分類';
function go(hash){ location.hash = hash; }
function card(a){
  return `<div class="card"><h3><a onclick="go('#/article/${a.id}')">${esc(a.public_title)}</a></h3>
    <div class="meta"><span>發布日 ${esc(a.public_date)}</span><span>${esc(a.source_org)}</span></div>
    <p style="color:var(--sub);font-size:14px">${esc((a.public_summary||'').slice(0,120))}…</p>
    <div><a class="tag" onclick="event.stopPropagation();go('#/topic/${encodeURIComponent(a.topic)}')">${esc(label(a.topic))}</a>
    <a class="tag" onclick="event.stopPropagation();go('#/country/${encodeURIComponent(a.country)}')">${esc(a.country)}</a></div></div>`;
}
function listView(title, items, lead){
  const body = items.length ? items.map(card).join('') : '<div class="empty">目前沒有符合的公開文章。</div>';
  return `<h1>${esc(title)}</h1>${lead?`<p class="lead">${esc(lead)}</p>`:''}${body}`;
}
function home(){
  const intro = `<h1>國際農業科技情報</h1>
    <p class="lead">追蹤美國、日本、歐盟、韓國等地的智慧農業、氣候韌性、植物健康、森林經濟等發展，每週精選並轉譯為可讀的深度文章。本站為個人研究與內容經營用途。</p>
    <h2>最新公開文章</h2>`;
  const items = [...DATA].sort((a,b)=>(b.public_date||'').localeCompare(a.public_date||''));
  return intro + (items.length?items.map(card).join(''):'<div class="empty">尚無已發布的公開文章。</div>');
}
function topics(){
  const counts={}; DATA.forEach(a=>counts[a.topic]=(counts[a.topic]||0)+1);
  const cells = Object.keys(LABELS).map(k=>`<a class="card" style="display:block;text-decoration:none" onclick="go('#/topic/${encodeURIComponent(k)}')"><h3>${esc(LABELS[k])}</h3><div class="meta">${counts[k]||0} 篇已公開</div></a>`).join('');
  return `<h1>主題分類</h1><div class="grid">${cells}</div>`;
}
function article(id){
  const a = DATA.find(x=>String(x.id)===String(id));
  if(!a) return '<div class="empty">找不到這篇公開文章。</div>';
  const tags = `<a class="tag" onclick="go('#/topic/${encodeURIComponent(a.topic)}')">${esc(label(a.topic))}</a><a class="tag" onclick="go('#/country/${encodeURIComponent(a.country)}')">${esc(a.country)}</a>`;
  const hero = a.public_image_url?`<img class="hero" src="${esc(a.public_image_url)}" alt="${esc(a.public_title)}" loading="lazy" referrerpolicy="no-referrer">`:'';
  return `<article class="article"><h1>${esc(a.public_title)}</h1>
    <div class="meta"><span>發布日 ${esc(a.public_date)}</span><span>原文語言：${esc(a.language)}</span><span>來源機構：${esc(a.source_org)}</span>${tags}</div>
    ${hero}<p>${esc(a.public_article)}</p>
    <div class="src"><strong>原始資料來源</strong><br>原文標題：${esc(a.title_original)}<br>
    原始網址：<a href="${esc(a.url)}" target="_blank" rel="noopener nofollow">${esc(a.url)}</a><br>
    發布日期：${esc(a.published_date)}</div></article>`;
}
function render(){
  const h = location.hash || '#/';
  const app = document.getElementById('app');
  let out;
  if(h.startsWith('#/article/')) out = article(decodeURIComponent(h.split('/')[2]));
  else if(h.startsWith('#/topic/')){ const t=decodeURIComponent(h.split('/')[2]); out=listView(label(t), DATA.filter(a=>a.topic===t)); }
  else if(h.startsWith('#/country/')){ const c=decodeURIComponent(h.split('/')[2]); out=listView(c, DATA.filter(a=>a.country===c)); }
  else if(h.startsWith('#/search')){ const q=decodeURIComponent((h.split('?q=')[1]||'')); const ql=q.toLowerCase();
    out=listView('搜尋：'+q, DATA.filter(a=>((a.public_title||'')+(a.public_summary||'')+(a.public_article||'')).toLowerCase().includes(ql)), `找到 ${DATA.filter(a=>((a.public_title||'')+(a.public_summary||'')+(a.public_article||'')).toLowerCase().includes(ql)).length} 篇`); }
  else if(h==='#/latest') out = listView('最新文章', [...DATA].sort((a,b)=>(b.public_date||'').localeCompare(a.public_date||'')));
  else if(h==='#/topics') out = topics();
  else out = home();
  app.innerHTML = out; window.scrollTo(0,0);
}
function doSearch(e){ e.preventDefault(); go('#/search?q='+encodeURIComponent(document.getElementById('q').value.trim())); return false; }
window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
