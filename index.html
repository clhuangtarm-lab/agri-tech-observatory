<script>
const DATA = [{"id": 85, "public_title": "AI判讀番茄品質，串接栽培與流通資料降低不良果與耗損", "public_summary": "由農研機構等單位組成的聯盟與企業共同開發以AI判定番茄品質的選果機，串接栽培與流通資料，實證降低不良果與廢棄損耗成效。", "public_article": "生鮮番茄在採收時外觀看似正常，進入儲運後卻可能因微細傷、色澤不均或內部品質問題而快速劣化。這類「潛在性品質不良」難以靠人工目視判斷，也容易造成流通端退貨與廢棄。\r\n\r\n日本可果美、澀谷精機、農研機構、AGRI SMILE及磐城小名濱菜園組成研究聯盟，自2023年起投入三年時間，開發以人工智慧判定番茄品質的選果設備，並把選果資料與栽培、流通資料串接。實證結果顯示，系統能找出不良果的栽培條件，也能預測儲運期間的品質劣化，作為調整栽培與出貨順序的依據。\r\n\r\n【人眼看不出的品質問題，往往在流通後才出現】\r\n\r\n研究重點放在「潛在性品質不良」。團隊希望在番茄進入流通前，先用設備蒐集外觀與內部品質資訊，再與栽培環境及物流條件比對，找出哪些果實較容易劣化，以及哪些管理因素可能提高不良果比例。\r\n研究團隊開發的AI選果機已於2024年4月導入磐城小名濱菜園的選果場。設備整合外觀品質攝影機與內部品質感測器，能在不破壞果實的情況下，高速蒐集每顆番茄超過20項外部與內部品質資料，番茄依序通過外觀攝影與內部感測模組，再由系統完成品質判讀。截至實證結束，系統已累積超過1,000萬筆資料。這些資料不只用於當下分級，也成為後續分析栽培條件與品質變化的基礎。\r\n\r\n【選果資料回到生產端，協助調整栽培條件】\r\n\r\n研究團隊將果實品質資料與栽培環境資料依時間序列整合，分析色澤不均與微細傷的發生條件，再依結果調整環境控制。實證結果顯示，調整栽培條件後，色澤不均果的發生率由52%降至45%，減少7個百分點；微細傷果的發生率則由43%降至13%，減少30個百分點。可販售果實比例也隨之提高。\r\n\r\n這項結果說明，選果設備不只負責分級。當品質資料能回傳到生產端，農場便能追查不良果與溫度、濕度、環境控制或栽培管理之間的關係，再據此修正管理方式。\r\n\r\n【預測品質劣化，調整出貨先後順序】\r\n\r\n研究團隊也把AI選果資料與流通資料整合，用來預測番茄在保管期間的品質變化。分析顯示，帶有微細傷等潛在性品質問題的果實，若依一般流程長時間儲運，較容易在通路端劣化。團隊因此安排這類果實提前出貨，縮短其在流通系統中的停留時間。\r\n依實證試算，這種出貨調整可使流通階段的廢棄量減少約30%。這項數字來自試驗條件下的推估，尚不能直接視為所有番茄供應鏈都能達成相同效果，但已顯示品質資料可用於出貨排序與物流管理。\r\n\r\n【五個單位分工完成系統實證】\r\n\r\n這項研究由五個單位共同執行，各自負責不同環節：可果美統籌研究、推動實證並規劃栽培與流通模式；澀谷精機負責AI選果系統與品質檢測技術；農研機構開發內部品質感測技術；AGRI SMILE分析選果、栽培環境與流通資料，並找出不良果成因；磐城小名濱菜園則提供實證場域。\r\n\r\n可果美與澀谷精機表示，後續將持續檢討AI選果機的使用方式，並評估導入其他可果美品牌生鮮番茄農場。研究團隊也規劃延續「資料蒐集、分析、提出假設、再實證」的循環，逐步改善栽培與流通管理。\r\n\r\n參考資料：https://www.kagome.co.jp/library/company/news/2026/img/2026060901_t.pdf", "public_article_format": "text", "public_date": "2026-07-18", "published_date": "", "public_image_url": "https://i.ibb.co/TMSJGqZK/Chat-GPT-Image-2026-7-18-12-42-48.png", "topic": "F_冷鏈食安與農食供應鏈", "country": "日本", "language": "日文", "source_org": "農研機構（NARO）新聞稿", "title_original": "(研究成果) 生鮮トマトの廃棄ロス低減を目指すコンソーシアムの実証成果 AIでトマトの品質を判定する選果機を共同開発 栽培・流通データとの連携で不良果・廃棄ロス低減を実証(外部リンク:カゴメ株式会社)", "url": "https://www.naro.go.jp/publicity_report/press/laboratory/nfri/176115.html"}, {"id": 90, "public_title": "37年土壤增溫實驗發現：暖化恐使穩定碳庫也開始分解", "public_summary": "美國哈佛森林進行近40年的土壤增溫實驗顯示，持續高溫30年後，原本被認為穩定的土壤有機碳也開始分解、釋出更多二氧化碳，森林土壤在暖化下的碳排放風險可能被低估。", "public_article": "森林土壤儲存大量碳，過去研究多認為，其中一部分有機碳結構穩定，不容易因短期升溫而分解。不過，美國一項持續37年的土壤增溫試驗顯示，當高溫延續數十年，土壤微生物可能開始分解這些原先較穩定的碳，並釋放更多二氧化碳。\r\n\r\n這項試驗位於麻薩諸塞州中部的哈佛森林，由海洋生物研究所科學家Jerry Melillo長期主持。研究團隊全年將試驗區土壤溫度維持在周邊土壤以上5°C，持續觀察森林土壤的碳循環與微生物變化。研究結果顯示，到了增溫試驗的第四個十年，原先被認為較能抵抗分解的土壤有機質也開始流失。\r\n\r\n【為何要讓土壤持續增溫5°C】\r\n\r\n研究團隊在試驗開始時，選擇將土壤溫度提高5°C。Melillo說明，這個幅度代表當時全球暖化預測的高值範圍。相較於短期實驗，長期增溫試驗能觀察微生物群落、土壤有機質與碳排放是否在數十年後出現新的反應。這類變化往往無法從幾個月或幾年的試驗中辨識。\r\n\r\n\r\n【持續增溫超過30年後，開始流失原先認為穩定的碳】\r\n\r\n土壤微生物會分解落葉、根系與其他有機物，並將氮、磷等養分重新釋放，供植物利用。微生物在分解有機質時，也會透過呼吸作用排放二氧化碳。溫度升高通常會加快微生物代謝，但微生物不會長期維持相同反應。隨著可利用有機質減少、微生物組成改變及土壤條件變化，土壤碳排放可能出現不同階段。這項試驗的重要發現，是長期增溫改變了微生物利用碳源的範圍。當較容易分解的有機質逐漸減少，微生物仍可能轉而利用原先分解速度較慢、保存時間較長的土壤碳。\r\n\r\n土壤有機碳並非單一物質。有些來自新鮮落葉或細根，微生物可以快速分解；有些則與礦物結合，或經過長期轉化，分解速度較慢，通常被視為相對穩定的碳庫。\r\n\r\n研究團隊在試驗持續增溫超過30年後，發現開始影響這些較穩定的有機質。這代表長期升溫造成的土壤碳損失，可能高於依短期實驗推估的結果。當穩定碳開始分解，森林土壤便會釋放原先長期儲存的二氧化碳。若這類現象廣泛發生，土壤可能減弱原有的碳儲存功能，並增加大氣中的溫室氣體。\r\n\r\n土壤碳與氣候之間存在回饋關係。氣溫升高後，微生物分解有機質的速度可能加快，促使土壤排放更多二氧化碳；大氣中二氧化碳增加，又會進一步推升全球溫度。過去氣候模型已納入土壤呼吸與碳損失，但對穩定碳在長期增溫下的反應仍有不確定性。這次觀察顯示，模型若低估穩定土壤碳的分解，便可能低估森林土壤未來的二氧化碳排放。\r\n\r\n【研究結果不代表所有土壤反應相同】\r\n\r\n這項試驗位於美國東北部溫帶森林，結果不能直接套用到熱帶森林、農地、草原、泥炭地或高緯度凍土。土壤碳的穩定性會受到溫度、降雨、土壤質地、礦物組成、植物種類、微生物群落與有機質來源影響。不同生態系統對升溫的反應速度與幅度可能差異很大。此外，試驗採用全年增加5°C的處理，與自然氣候變遷中的季節變化、乾旱、極端降雨及植物生長反應仍有差別。研究提供的是長期增溫可能影響穩定碳的證據，仍需結合其他地區與不同生態系統的資料，才能推估全球影響。\r\n\r\n", "public_article_format": "text", "public_date": "2026-07-18", "published_date": "2026-07-14", "public_image_url": "", "topic": "E_低碳農業土壤與循環生物經濟", "country": "國際", "language": "英文", "source_org": "ScienceDaily 農業與食品", "title_original": "A 37-year soil experiment revealed a hidden climate threat", "url": "https://www.sciencedaily.com/releases/2026/07/260713000809.htm"}, {"id": 92, "public_title": "日中團隊以精準基因編輯，讓水稻鎘吸收量降低48%且不影響產量", "public_summary": "日本岡山大學與中國科學院團隊以鹼基編輯技術，在水稻金屬轉運蛋白基因OsNramp5找到一個關鍵點突變，可大幅降低稻米鎘吸收，同時維持正常錳吸收與植株生長表現。", "public_article": "稻米中的鎘含量涉及食品安全，也是一項難度較高的育種課題。水稻吸收鎘時，經常利用原本負責運輸錳等必需元素的蛋白質。若直接關閉這些運輸途徑，雖能降低鎘累積，也可能影響養分吸收、植株生長與產量。\r\n\r\n日本岡山大學與中國科學院研究團隊利用鹼基編輯技術，改變水稻金屬運輸蛋白OsNramp5中的一個胺基酸。田間試驗顯示，編輯後水稻的糙米鎘濃度由每公斤0.14毫克降至0.07毫克，降幅約48%；產量及鐵、錳、鋅等微量元素含量則未出現明顯變化。\r\n\r\n【降低鎘吸收，容易連帶影響錳營養】\r\n\r\n鎘是具有毒性與致癌風險的重金屬，可能因工業化、都市發展及其他人為活動進入農地土壤，再由作物帶入食物鏈。水稻吸收鎘的能力高於多數主要穀物，因此成為全球人口攝取鎘的來源之一。育種人員長期嘗試降低稻米鎘含量，但相關基因通常也參與植物必需元素的吸收。這次研究鎖定的OsNramp5，主要存在於水稻根部細胞，負責運輸錳與鎘。錳參與光合作用及多項酵素反應，是水稻正常生長所需的微量元素。\r\n\r\n過去研究曾直接敲除OsNramp5，以減少水稻吸收鎘。然而，OsNramp5失去功能後，也可能降低錳吸收，進而影響植株生長與產量。研究團隊因此改以調整蛋白質的金屬選擇性為目標，希望降低鎘向稻穀移動，同時保留必需元素的運輸功能。\r\n\r\n【從1,600多個編輯品系篩選出關鍵突變】\r\n\r\n研究團隊使用腺嘌呤與胞嘧啶鹼基編輯器，針對OsNramp5製造大量細微突變，再比較不同變異對鎘累積、錳吸收及植株生長的影響。團隊建立超過1,600個基因編輯水稻品系，最後找到表現較佳的突變。這項突變將OsNramp5蛋白第441個位置的異白胺酸改為蘇胺酸，研究中記為OsNramp5^I441T。研究人員接著進行植株生理分析、基因表現測定、蛋白質定位、酵母運輸試驗，以及鎘污染土壤的田間試驗，以確認這項突變如何影響金屬運輸。\r\n\r\n試驗結果顯示，OsNramp5^I441T降低了水稻地上部與稻穀中的鎘累積，但沒有改變OsNramp5的基因表現量、蛋白質含量及細胞內定位。在鎘污染土壤的田間試驗中，未編輯水稻的糙米鎘濃度為每公斤0.14毫克，編輯水稻則降至每公斤0.07毫克。兩者的穀粒產量沒有明顯差異，糙米中的鐵、錳與鋅含量也維持相近水準。結果顯示，研究團隊並未藉由全面抑制金屬吸收來降低鎘，而是改變蛋白質運送不同金屬的偏好，因此減少了對水稻營養與生長的影響。\r\n\r\n【鋅增加後，抑制鎘向地上部移動】\r\n\r\nOsNramp5除了運輸錳與鎘，也能運輸鋅。I441T突變提高了蛋白質對鋅的運輸能力，使更多鋅累積於根部細胞。根部鋅濃度提高後，鋅與鎘在根部向地上部運輸的過程中產生競爭，減少鎘進入輸導組織的機會。鎘由根部運往莖葉的量下降後，最終進入稻穀的鎘也隨之減少。這種調整保留了水稻吸收必需礦物質的能力，也降低了稻穀鎘含量。\r\n\r\n現行降低稻米鎘含量的方法包括土壤改良、灌溉管理及品種選育。田間管理需要持續投入，也會受到土壤性質、水源及氣候條件影響；直接敲除金屬運輸基因，則可能干擾必需元素吸收。這次研究僅改變一個胺基酸，使OsNramp5保留原有功能，同時調整其金屬運輸偏好。研究團隊認為，OsNramp5^I441T可作為培育低鎘水稻的遺傳材料，尤其適合評估應用於輕度鎘污染土壤。\r\n\r\n目前試驗已證實這項突變能降低糙米鎘含量，但實際育種與推廣仍需累積更多資料。\r\n不同水稻品種的遺傳背景、土壤中的鎘與鋅濃度、酸鹼值、灌溉方式及施肥管理，都可能影響金屬吸收與運輸。後續研究仍需透過多年、多地試驗，確認低鎘效果、產量與米質能否維持穩定。這項技術也無法取代污染農地管理。若土壤鎘濃度偏高，仍需搭配水分管理、土壤改良及食用安全監測。品種改良的作用，是降低水稻將鎘帶入可食部位的風險，並增加田間管理的緩衝空間。\r\n\r\n", "public_article_format": "text", "public_date": "2026-07-18", "published_date": "2026-07-16", "public_image_url": "", "topic": "C_IPM植物健康與農藥減量", "country": "國際", "language": "英文", "source_org": "Phys.org 農業", "title_original": "Tiny gene edit cuts cadmium in rice by 48% without reducing yields", "url": "https://phys.org/news/2026-07-tiny-gene-cadmium-rice-yields.html"}, {"id": 97, "public_title": "美國調查顯示，52%農民認為AI與數位工具目前未帶來明顯幫助", "public_summary": "普渡大學與CME集團「農業經濟指標」調查400位美國農民，52%認為AI與數據工具目前對農場經營沒有實質幫助，僅14%認為AI能減少人力需求，反映農民對AI導入農場的實用性仍持保留態度。", "public_article": "農業科技業者常以降低人工與資材成本，說明人工智慧與數位工具對農場經營的價值。不過，美國普渡大學與芝加哥商品交易所集團最新一期「農業經濟景氣指標」調查顯示，農民對這些工具仍抱持明顯疑慮。\r\n\r\n在受訪的400位美國農業生產者中，52%表示，AI與資料驅動工具目前對自身農場「沒有帶來明顯效益」。真正認為這些工具能降低人工需求與成本的農民，僅占14%。調查結果顯示，農民對AI的期待，與農業科技產業常見的宣傳重點並不完全一致。相較於節省人工，22.8%的受訪者較認同AI與數位工具能提高產量；至於降低風險與不確定性，多數農民仍未感受到明顯幫助。\r\n\r\n【農民尚未找到適合自己的使用方式】\r\n\r\n普渡大學商業農業中心主任、調查主持人Michael Langemeier指出，AI與資料工具未來應能產生實際效益，但多數農民目前還不清楚這些工具要如何融入自己的經營。\r\n\r\n他認為，隨著使用經驗增加，未來認為AI對農場有幫助的農民比例可能提高。不過，農民需要時間理解工具功能，也需要確認建議能否配合現場條件。特別是農業決策受到天候、機械、人力與田間條件影響。即使AI提供明確建議，農民也不一定能在現場完全執行。例如，系統可能建議某一天播種玉米，但當天若遇到降雨，或播種機臨時故障，農民仍必須延後作業。Langemeier指出，資料驅動工具需要一段學習期。農民除了理解建議內容，也要判斷建議是否符合現場狀況。部分工具提出的管理處方過於精細，實務上未必能完全落實。\r\n\r\n【高資材成本仍是農場財務的最大壓力】\r\n\r\n這期調查也詢問農民，哪些因素最限制農場財務改善。42%的受訪者將高資材成本列為首要問題，比例明顯高於其他選項。其次為農產品價格偏低，占17%；天候風險占14%；政策不確定性占11%；人工與設備問題占9%；債務或財務壓力占8%。這些結果說明，農民目前最直接的經營壓力仍來自肥料、種子、燃料、農藥與其他投入成本。即使AI工具主打節省資材，若農民無法明確看見投入與回報之間的差距，導入意願仍然有限。\r\n\r\n【AI能否落地，關鍵在於是否對應農場問題】\r\n\r\n這項調查反映，農業科技產業常談AI能降低成本、改善決策，但農民更在意工具能否處理眼前問題。若系統只能提供一般化建議，或需要大量資料輸入、設備更新與人員訓練，農民可能難以判斷導入是否划算。對中小型農場而言，初期成本與操作複雜度也可能抵銷預期效益。農民較容易接受的工具，通常具備幾項條件：能處理明確問題、操作簡單、建議符合田間節奏，並能用產量、成本或風險變化證明效益。\r\n\r\n本次調查尚未細分不同作物、農場規模與數位化程度，因此無法判斷哪些農民對AI較為接受，也無法比較不同工具的使用成效。不過，結果已顯示，AI在農業上的普及程度，不能只看工具數量或業者投入，也要看農民是否能在實際經營中獲得可辨識的效益。", "public_article_format": "text", "public_date": "2026-07-18", "published_date": "2026-07-15", "public_image_url": "", "topic": "A_智慧農業與資料治理", "country": "國際", "language": "英文", "source_org": "AgFunder News", "title_original": "Many growers still find ‘no meaningful benefit’ from AI use on the farm: survey", "url": "https://agfundernews.com/many-growers-still-find-no-meaningful-benefit-from-ai-use-on-the-farm-survey"}, {"id": 104, "public_title": "日本參議院院會17日通過因應氣候變遷等重要農產品品種開發與普及新法", "public_summary": "日本參議院院會17日通過因應氣候變遷等重要農產品品種開發與普及新法，將由國家制定「基本方針」，整合縣、企業與農研機構等單位共同推動品種開發。", "public_article": "因應氣候變遷等挑戰，推動重要農作物品種育成與種苗生產的新法，已於7月17日在日本參議院全體會議表決通過，獲朝野多數議員支持，正式成立。\r\n\r\n這項新法全名為《重要品種育成及其種苗生產振興法》，通稱「氣候變遷等因應品種法」。日本政府指出，隨著高溫等氣候衝擊逐漸影響農業生產，為確保糧食穩定供應，必須加快育成並普及具高溫耐受性、抗病性及高產等特性的關鍵品種。新法也將搭配《種苗法》修正，強化重要品種及其他新品種的育種者權利保護。\r\n\r\n依新制度，日本中央政府將先訂定重要品種育成與普及的基本方針，內容包括哪些特性應列為重點、如何運用基因體分析等先進技術、如何納入市場與實際需求端評估，以及新品種智慧財產權的保護方式。\r\n\r\n在品種育成方面，日本農研機構、都道府縣及民間企業可單獨或共同提出「重要品種育成事業計畫」，說明新品種特性、預定栽培地區、目標普及面積、需求端評估方式及品種登錄申請時程，經農林水產大臣認定後，可使用農研機構的研究設施與設備，並獲得品種登錄申請費等減免。完成育成的重要品種，也必須提出品種登錄申請。\r\n\r\n在種苗生產與普及方面，都道府縣將依中央基本方針擬定區域計畫，規劃重要品種的生產、普及方向及種苗生產區域。種苗生產者則可依地方計畫提出生產計畫，內容包括生產量、種苗生產區域規模及農地集中方式，經知事認定後，可參與農地整合相關協議，並適用農地利用調整及農業用地編入程序簡化等措施。\r\n\r\n此外，種苗生產者也可與周邊農業者訂定栽培管理協議。即使農地之後由他人承接，該協議效力仍可延續，以維持種苗生產區域的管理一致性。\r\n\r\n新法預定在公布後六個月內，由政令另定施行日期。整體制度希望建立由中央訂定方向、產官學共同育種、地方政府規劃普及、種苗業者穩定生產的推動架構，加快氣候調適品種從研發走向產地應用。\r\n\r\n資料來源：https://www.maff.go.jp/j/law/bill/attach/pdf/221-30.pdf\r\n", "public_article_format": "text", "public_date": "2026-07-18", "published_date": "2026-07-18", "public_image_url": "https://i.ibb.co/Pvz9kBYB/Chat-GPT-Image-2026-7-18-11-32-50.png", "topic": "B_氣候韌性與農業風險管理", "country": "日本", "language": "日文", "source_org": "日本農業新聞", "title_original": "気候変動対応の品種開発へ新法成立 国主導で開発", "url": "https://www.agrinews.co.jp/news/index/394564"}, {"id": 109, "public_title": "日本新創公司與北海道政府合作，建置AI伐採狀況判釋模型示範計畫", "public_summary": "日本新創公司Archeda與北海道政府簽約，於令和8年度執行「伐採狀況把握AI模型建置實證」委託業務，以衛星資料結合AI偵測伐採狀況，協助廣域森林監測與森林行政作業效率化。", "public_article": "北海道森林面積廣大，地方政府若要逐一前往現場確認伐採情形，需要投入大量人力與時間。隨著林業從業人口減少、地方政府林務人員有限，如何持續掌握伐採進度與範圍，已成為森林行政的重要課題。北海道政府2026年度啟動「伐採狀況掌握AI模型建置實證」，由日本新創公司Archeda承接。這項計畫將結合衛星影像與人工智慧，辨識北海道境內可能發生伐採的區域，再提供林務人員作為現地查核與行政判斷的參考。\r\n\r\n【衛星影像先篩選，現勘再確認】\r\n\r\n衛星能以固定頻率拍攝大範圍地表。若搭配不同時間的影像，便能比對森林覆蓋與地表變化，找出疑似伐採區域。本案的AI模型將分析北海道境內的時序衛星資料，辨識林地中近期出現明顯變化的位置。行政人員可依分析結果安排後續查核，優先處理變化較明顯或風險較高的區域。由於衛星影像可能受到雲層、積雪、季節變化與地形影響，AI也可能將整地、風倒木或其他地表變化判定為伐採。因此，由模型扮演篩選工具，協助地方政府便能將有限人力集中在需要進一步確認的區域，並提高伐採狀況的掌握頻率。\r\n\r\n【以林班單位追蹤伐採時間與位置】\r\n\r\nArcheda表示，既有森林分析系統能以林小班等管理單位，追蹤不同時間的衛星影像，辨識伐採發生的位置。這項功能可協助地方政府比對伐採申報內容，確認實際作業位置、範圍與時間是否一致。若系統發現申報區域外出現地表變化，行政人員也能進一步查核。除了伐採辨識，Archeda目前提供的森林分析項目還包括：\r\n\r\n* 造林與更新狀況監測\r\n* 樹高與樹冠辨識\r\n* 森林資源量推估\r\n* 無人機現地量測\r\n* 申請、申報及施業紀錄的地圖化管理\r\n其中，森林管理雲端平台「森ノート」可整合施業紀錄、申請資料與衛星分析結果，讓管理人員直接在地圖上查閱不同林區資訊。\r\n\r\n【北海道成為大範圍森林監測的測試場域】\r\n\r\n北海道是日本森林面積最大的地區之一，林地分布廣，地形與氣候條件差異也大。傳統森林管理高度依賴現地巡查。這種方式能取得直接資訊，但在人力有限、林區範圍廣大的情況下，很難維持高頻率與完整覆蓋。但對森林行政而言，重要的不是單次偵測結果，而是能否建立穩定更新、可追溯且能與申報制度銜接的資料基礎。\r\n對衛星與AI監測而言，北海道能提供足夠規模的測試環境，也能檢驗模型面對積雪、雲層及不同林型時的辨識能力。本次實證的重點不只在於AI能否辨識影像，還包括分析結果能否配合行政流程。當地方政府持續保存不同年份的伐採、造林與森林資源資訊，便能進一步分析更新進度、施業分布及森林變化趨勢。\r\n\r\n", "public_article_format": "text", "public_date": "2026-07-18", "published_date": "2026-07-16", "public_image_url": "", "topic": "D_森林木竹及林下經濟", "country": "日本", "language": "日文", "source_org": "日本農業新聞", "title_original": "Archeda、北海道の令和8年度「伐採状況把握AIモデル構築実証」委託業務の契約を締結 株式会社Archeda 2026年7月16日 掲載", "url": "https://www.agrinews.co.jp/news/prtimes/393980"}, {"id": 51, "public_title": "植物也能戴上「穿戴裝置」：葉片貼片與莖部感測器，讓農民提早掌握缺水、鹽害與生長異常", "public_summary": "美國塔夫茨大學（Tufts）團隊開發植物「穿戴式」感測器，希望在作物出現捲葉、生長遲緩等可見症狀「之前」，就抓到逆境訊號。研究刊於《ACS Applied Materials & …", "public_article": "農民在田間看到葉片捲曲、植株矮化或生長停滯時，作物往往已經承受數日壓力。等到症狀明顯出現，缺水、鹽分累積或養分失衡可能已影響光合作用與生長。美國塔夫茨大學研究團隊近期開發一套植物「穿戴式感測器」，希望在作物外觀尚未出現異常前，便掌握植物的生理反應。\r\n\r\n這套系統包含兩種裝置：一種是貼附於葉片表面的薄型感測器，外觀看起來像暫時性刺青；另一種則是纏繞在莖部、可隨植物生長伸展的感測帶。兩者分別量測葉片水分交換狀況及莖部直徑變化，藉此判斷植物是否正面臨缺水、鹽害或生長受阻。更特別的是，葉片感測器不需要外接電池，而是利用植物蒸散所產生的水分交換自行發電。\r\n\r\n【從空中俯瞰，走向植物本身的即時反應】\r\n\r\n目前農業監測已廣泛使用衛星、無人機、土壤感測器與田間氣象站。衛星與無人機可以透過可見光、紅外線及微波影像，觀察作物覆蓋、葉色、生長不均、溫度、病蟲害及土壤含水量。土壤感測器則能量測水分、溫度、酸鹼值及部分養分，氣象站也能提供氣溫、濕度、降雨、風速與日照等資訊。這些工具能協助農民掌握田區整體環境，但多半反映兩種情況：一是可能在未來對作物造成影響的外部條件，二是已經發生的生長異常或受害結果。\r\n\r\n植物穿戴式感測器研究團隊希望直接觀察植物當下如何回應環境，在葉片萎凋、捲曲或植株生長受阻前，提供較早的警示。研究主持人、塔夫茨大學電機與電腦工程學教授Sameer Sonkusale表示，這項技術的發展目標是讓整片農田未來能布建植物層級的監測網路。每一株或每一區代表性作物都能回傳缺水、鹽害、病害或養分失衡的早期訊號。衛星與無人機提供的是空中視角，植物穿戴裝置則提供更貼近植株本身的觀察。\r\n\r\n【葉片感測器量測「空氣有多想把水吸走」】\r\n\r\n葉片感測器主要量測蒸氣壓差，也就是VPD（Vapor Pressure Deficit，空氣吸收水分的能力），當VPD偏高時，代表空氣較乾燥，葉片水分散失速度會加快。植物通常會關閉氣孔，降低蒸散量，避免過度失水。氣孔關閉雖然能減緩脫水，也會限制二氧化碳進入葉片，使光合作用與生長速度下降。因此，VPD不只是環境濕度指標，也能反映植物正面臨的水分壓力。\r\n\r\n【利用植物蒸散水分自行發電】\r\n\r\n葉片感測器的核心材料是五氧化二釩晶體。研究人員將五氧化二釩製成極薄的奈米片，再層層堆疊成膜。感測器上方另設置一層由碳原子構成的石墨烯，形成可以讓水氣通過的微型篩網。當植物蒸散產生的水分穿過石墨烯，進入五氧化二釩奈米片層後，水分會形成離子，並在材料內移動產生電流。水分交換愈強，產生的電流也愈大，感測器產生的電力只有微瓦等級，但搭配低功耗電子元件及儲能裝置，已足以支援定期量測。\r\n\r\n【莖部感測帶記錄植物有沒有繼續長大】\r\n\r\n葉片感測器觀察的是較快速的水分交換反應，莖部感測帶則記錄較慢的生長變化。莖部裝置採用日本剪紙藝術「切紙」的結構概念，在材料表面設計特殊切口，使感測帶可以隨著莖部膨大伸展與變形。感測器外層塗覆一種稱為共熔凝膠的柔軟導離子材料。當莖部直徑增加或縮小時，凝膠的形狀與電阻會隨之改變，系統便能持續追蹤莖粗變化。\r\n\r\n植物健康生長時，莖部直徑通常會逐漸增加；遭遇缺水或鹽害時，生長可能趨緩，莖部甚至會暫時收縮。將葉片與莖部感測器搭配使用，可以同時掌握不同時間尺度的生理反應。葉片感測器較快反映水分散失狀況，莖部感測器則呈現生長累積結果。\r\n\r\n【甜椒試驗辨識缺水與鹽害】\r\n\r\n研究團隊以甜椒植株進行測試，觀察健康植株、缺水植株及鹽分逆境植株的差異。健康甜椒的VPD會隨每日空氣濕度變化呈現規律起伏，反映正常的日夜水分交換週期。缺水植株的VPD則呈現持續上升趨勢，顯示葉片面臨較強的水分散失壓力。鹽分逆境植株呈現另一種反應。與健康對照組相比，其VPD反而較低。研究人員推測，這可能與鹽分影響根系吸水能力及氣孔調節有關。莖部感測器也記錄到明顯差異，健康植株的莖部持續增粗，受壓力植株則出現生長減緩或直徑縮小。兩類感測訊號搭配後，系統不只判斷植物是否受到壓力，也有機會進一步區分不同逆境類型。\r\n\r\n【從田區平均值，走向植株層級管理】\r\n\r\n現有農業監測多以田區或區域為單位，提供平均溫度、土壤水分或影像變化。這類資訊適合掌握整體趨勢，但可能忽略同一田區內不同植株的差異。植物穿戴式感測器讓監測尺度進一步縮小到單株或代表性植株，直接讀取作物的生理反應。對設施農業、高價值果樹、育苗生產或鹽害風險較高的田區而言，這類即時監測可能具有較高應用價值。農民可以在肉眼症狀出現前察覺異常，縮短發現問題與採取措施之間的時間。\r\n\r\n\r\n臺灣設施農業與高價作物對早期逆境、病害預警需求高。逐株葉片感測若成熟，可對照農業部智慧農業與植物醫師的監測體系。不過，這項技術目前仍處於研究與系統開發階段。未來能否普及，仍需評估感測器成本、使用壽命、田間耐候性、不同作物的校正需求、資料判讀方式及大面積布建的可行性。\r\n\r\n\r\n#智慧監測 #IPM #設施農業 #植物感測\r\n\r\n\r\n原文標題：Wearables to track plant health: Farmers could use real-time information to manage crop conditions\r\n原始網址：https://phys.org/news/2026-07-wearables-track-health-farmers-real.html", "public_article_format": "text", "public_date": "2026-07-12", "published_date": "2026-07-09", "public_image_url": "", "topic": "C_IPM植物健康與農藥減量", "country": "國際", "language": "英文", "source_org": "Phys.org 農業", "title_original": "Wearables to track plant health: Farmers could use real-time information to manage crop conditions", "url": "https://phys.org/news/2026-07-wearables-track-health-farmers-real.html"}, {"id": 52, "public_title": "AI 變量播種：以土壤、地形與歷年產量資料，找出玉米與大豆的最佳播種策略", "public_summary": "美國密蘇里大學團隊以人工智慧分析俄亥俄州兩座農場的土壤、地形與多年產量資料，依田區條件給出不同播種密度建議。研究在玉米上取得穩定可預測的結果，大豆則因受天候影響較大而仍待更多資料驗證。", "public_article": "農民愈來愈重視每一分土地的投入效益，但傳統播種方式往往對整塊農田採用相同密度。問題在於，看起來平整一致的田區，土壤肥力、水分條件、地勢與侵蝕風險可能差異很大。美國密蘇里大學研究團隊近期利用人工智慧與地理空間分析，探索如何依照田區內不同位置的條件，調整播種密度，讓種子投入更接近實際產量潛力。\r\n\r\n研究以美國俄亥俄州兩座農場的玉米與大豆資料進行分析。結果顯示，玉米對變量播種的反應較穩定，較適合近期導入精準農業；大豆則受到天候影響較大，模型仍需要更多資料與田間驗證。\r\n\r\n【同一塊田，不同位置的生產條件並不相同】\r\n\r\n密蘇里大學農業系統科技助理教授、研究共同通訊作者Jasmine Neupane指出，從道路旁看去，一整片農田可能相當整齊，但田區內部的條件通常並不均一。有些位置土壤較肥沃，保水能力較佳；另一些區域則可能地勢較低、容易積水，或因坡度、沖蝕與養分流失而降低生產力。若所有位置都採用相同播種密度，部分高潛力區域可能沒有充分利用，低潛力區域則可能投入過多種子，增加成本，卻未必提高產量。這也是變量播種技術希望處理的問題。\r\n\r\n【播得更多，不一定收得更多】\r\n\r\n在土壤與水分條件良好的區域，較高的播種密度可能帶來增產；在生產潛力較低的位置，同樣增加種子量，反而可能提高種苗成本，卻無法形成相對應的收益。研究團隊因此導入變量播種技術，也就是VRS（Variable-Rate Seeding）。搭載變量控制系統的播種機，在田間移動時，可以依照不同區位的產量潛力，即時調整播種量。高潛力區域採用較高密度，條件較差的區域則適度降低，避免全田使用同一標準。\r\n\r\n【AI如何判斷分區播種量】\r\n\r\n研究團隊將農場常見的資料輸入人工智慧模型，包括：\r\n* 土壤採樣資料\r\n* 田區高程與地形資訊\r\n* 多年產量紀錄\r\n* 不同區位的生產表現\r\n* 播種密度與投入成本\r\n\r\n模型分析各項資料後，找出播種密度與產量、收益之間的關係，再提出較符合特定位置條件的播種建議。Neupane表示，人工智慧能協助農民判斷田區不同位置適合的播種密度，也能延伸應用於肥料及作物保護資材管理。當農民更清楚哪些位置具有較高生產潛力，便能集中投入種子、肥料與其他資材；產量反應有限的區域則不必持續增加投入。這類管理方式有助於降低不必要的成本，也能減少養分與農業化學資材流失，降低逕流對鄰近土壤及水體的影響。\r\n\r\n【玉米的結果較穩定，接近實務應用階段】\r\n\r\n研究團隊比較玉米與大豆後發現，玉米的分析結果較為一致，也較容易預測。模型可以辨識哪些區位提高播種密度後能增加收益，哪些區域即使增加種子量，經濟效益仍然有限。這代表玉米的播種密度與土壤、地形及歷年產量之間，存在較穩定的關係。只要農場累積足夠資料，模型便有機會提供具有實用價值的分區建議。不過，研究並未表示提高播種密度一定能增加收益。真正的重點是找出適合增加密度的位置，同時辨識不需要額外投入的區域。\r\n\r\n另一方面，大豆具有較強的生長調節能力。當播種密度較低時，單株可能增加分枝、形成更多莢果，以部分補償株數不足；播種密度較高時，植株也會依照光線、水分與空間條件調整生長。這種適應能力有助於作物面對環境變化，卻也讓播種密度與最終產量之間的關係變得不容易預測。因此，同一套播種策略在不同年份可能產生不同結果。某一年適合提高密度的區域，隔年若遇到乾旱、高溫或降雨分布改變，效果可能不再相同。\r\n\r\n【經濟最佳值，不等於單純追求最高產量】\r\n\r\n這項研究同時分析農藝與經濟層面的最佳播種密度。農藝上的最佳值，通常是能獲得最高產量的播種密度；經濟上的最佳值，則必須同時考量種子成本、肥料投入、管理費用及作物售價。最高產量不一定帶來最高利潤。若為了增加少量產量而大幅提高種子投入，額外收入可能不足以支應增加的成本。人工智慧模型的作用，是比較不同播種密度下的投入與收益，協助農民找出較接近經濟效益最佳值的管理方式。當種子價格、作物售價或肥料成本改變時，最佳播種密度也可能隨之調整。因此，這類系統不能只依賴一次性的分析結果，而要持續更新成本、市場及田間資料。\r\n\r\n\r\n農民原本就知道低窪處、沙質區或坡地的產量可能不同。人工智慧進一步把這些經驗與土壤、地形及產量紀錄整合，將田區劃分為更細緻的管理區域。這項技術的實際效益，仍取決於資料品質、機具設備、種子成本、作物價格，以及農民是否具備長期而完整的產量紀錄。對資料累積較完整、已使用衛星定位與產量監測設備的農場而言，變量播種較容易導入。缺乏數位資料的小型農場，則可能需要先從土壤採樣、田區分區及產量紀錄做起。\r\n\r\n回到臺灣，近年推動智慧農業與精準農業，農業部與各區農業改良場都有相關試驗，但變量播種要發揮效益，通常需要夠大的田區、可即時調整密度的農機，以及多年累積的田間與產量資料，而臺灣田區相對破碎、單位面積較小，導入時的設備成本與資料累積可能構成主要門檻。這項研究對玉米與大豆的差異，也提醒技術效益會因作物特性而不同，導入評估宜以個別作物與田區條件為準。相關題目適合由農業部、農業試驗所、各區農業改良場，以及大學農藝與農機系所，作為智慧農業示範與農機補助政策的觀察對象。\r\n\r\n原文標題：Leveraging machine learning and geospatial analysis to determine agronomic and economic optima for variable-rate seeding in corn and soybean\r\n原文連結：https://phys.org/news/2026-07-future-ai-farm.html", "public_article_format": "text", "public_date": "2026-07-12", "published_date": "2026-07-08", "public_image_url": "", "topic": "A_智慧農業與資料治理", "country": "美國", "language": "英文", "source_org": "Phys.org 農業", "title_original": "Planting the future: Researchers put AI to work on the farm", "url": "https://phys.org/news/2026-07-future-ai-farm.html"}, {"id": 64, "public_title": "AI在消費品研發無所不在，但真的有推動進展嗎？九成大型消費品企業已使用AI，但真正融入日常流程的僅約兩成", "public_summary": "調查發現，大型消費品公司57%研發主管認為，生成式AI產出的配方成果過於籠統，仍需大量人工修改才能使用。", "public_article": "人工智慧已進入大型食品與消費品企業的研發部門，但「開始使用」與「真正產生效益」之間，仍有明顯差距。AI研發平台業者Turing Labs近期針對美國與歐洲290位大型消費品企業資深研發主管進行調查。結果顯示，91%的受訪者已在工作中使用AI，或正在進行試驗、擴大導入；然而，僅有19%表示AI已真正嵌入日常研發流程。更值得注意的是，即使企業投入大量試驗，真正能持續使用並創造明確商業效益的案例仍然有限。Turing Labs創辦人暨執行長Manmit Shrimali認為，食品與消費品產業目前並不缺乏AI概念或創新點子，真正缺少的是一套能整合市場、配方、法規、成本與量產條件的新型研發模式。\r\n\r\n【AI應用很多，真正改變研發流程的卻不多】\r\n\r\n從表面上看，九成以上大型企業已開始使用AI，似乎代表產業導入速度相當快。但進一步分析後可以發現，多數應用仍集中在概念發想、資料搜尋、文件摘要與初步研究。這些任務適合通用型大型語言模型，也較容易快速看到成果。目前AI帶來較明顯效益的部門，反而常是行銷而非研發。企業可以利用AI減少廣告代理商支出、提高內部內容製作效率，或加快文案、圖像與市場素材產出。\r\n\r\n這些應用確實能降低成本，卻不等同於產品創新。當企業試圖把AI用在配方設計、法規判斷、成分選擇與商品化時，問題便開始浮現。依據Turing Labs調查：\r\n\r\n* 20%的AI計畫最後沒有進入正式執行\r\n* 14%雖然曾經導入，之後又遭到放棄\r\n* 24%仍在使用，但幾乎沒有產生明顯商業效益\r\n* 57%的受訪者認為，生成式AI提供的配方結果過於籠統，仍需大量人工修正與驗證\r\n\r\n這些數據顯示，大型企業並非沒有接觸AI，而是仍在尋找適合高專業門檻研發工作的使用方式。\r\n\r\n【食品配方不是單純的搜尋問題】\r\n\r\n通用型AI工具之所以在食品研發上容易失準，主要原因在於配方設計牽涉的條件遠比文字生成複雜。一項食品或飲料產品從概念走向上市，通常需要同時考量：\r\n\r\n* 原料化學特性\r\n* 成分間相互作用\r\n* 食品法規與標示限制\r\n* 製程與設備適用性\r\n* 原料價格與供應穩定性\r\n* 風味、口感與外觀\r\n* 保存期限\r\n* 營養目標\r\n* 消費者定位\r\n* 通路與市場策略\r\n\r\n這些條件彼此牽動。降低糖分可能影響口感與保存性，替換原料可能改變製程穩定度，改善營養標示也可能提高成本。因此，食品研發不能只依靠「找出可能答案」，還必須確認這個答案是否能生產、符合法規、具有市場競爭力，並在成本範圍內維持品質。Shrimali指出，部分企業曾嘗試把數千份技術白皮書上傳到通用聊天工具，再直接詢問配方問題，最後卻發現相同問題可能得到不同答案。對一般資料整理而言，這種差異或許尚可接受；對配方、食品安全與法規決策來說，結果不穩定便可能形成重大風險。\r\n\r\n【問題不只在工具，也在企業如何看待AI】\r\n\r\n企業常見的另一項錯誤，是把AI視為加快既有流程的工具，卻沒有重新思考研發工作應如何組織。許多企業希望AI縮短現有作業時間，例如加快配方調整、整理研究報告或協助製作簡報。這些做法能改善局部效率，但若流程本身存在部門斷點、資料孤島或重複決策，單純加速並不會解決根本問題。食品研發經常涉及市場、研發、法規、採購、製造與財務等多個部門。若各部門使用不同資料系統，且在產品開發後期才交換意見，許多問題仍會延後才被發現。AI真正可能帶來的變化，是讓這些條件更早被整合，而不是單純讓其中某一個步驟變快。\r\n\r\n企業導入AI大致可以分為三類。\r\n\r\n第一類企業認為自己有能力建立內部系統，但實際開始後才發現開發時間過長，成本也不斷增加。\r\n第二類企業同時進行許多AI試驗，持續更換工具與供應商，卻沒有足夠人力深入使用任何一套系統。\r\n第三類企業會先明確界定問題，選擇單一合作夥伴，再投入時間與資料進行整合。\r\n\r\n部分大型消費品企業過去投入數百萬美元建立資料庫，期待最後能形成一套涵蓋所有研發工作的智慧系統。實際結果卻常是零散的局部成果。資料雖然被集中保存，產品開發人員仍然不知道如何使用，企業對AI能否真正改變產品創新也逐漸失去信心。這說明資料集中本身並不等於智慧決策。若缺乏明確問題、專業模型與工作流程設計，再完整的資料庫也可能無法直接轉換為研發成果。\r\n\r\n導入初期，企業可以從一個商業問題開始，例如：「如何從自有品牌手中重新取得義大利麵醬市場占有率？」\r\n\r\n系統接著分析問題可能出在哪裡，包括產品配方、售價、包裝規格、產品宣稱、法規限制與消費者定位。後續再進一步推演：\r\n\r\n* 應該開發什麼產品\r\n* 哪一種配方較合適\r\n* 大規模生產成本是多少\r\n* 法規風險集中在哪些地方\r\n* 現有產品組合有哪些成本可以調整\r\n* 節省下來的資源是否能支應新品上市\r\n\r\n配方最佳化仍然是其中一項功能，但已不是整套系統的唯一核心。\r\n\r\n【AI可以提早發現法規風險】\r\n\r\n在食品產品開發流程中，法規審查經常發生在配方完成之後。產品開發人員將配方交給法規部門，再等待數天取得回覆。若發現某項原料、用量或宣稱不符合規定，便需要重新修改配方，增加開發時間。但AI在法規工作的潛力，是把風險判斷往前移。系統可以在產品開發初期便標示潛在法規問題，將規定轉換成可操作的配方限制，並提出替代原料或調整方向。這樣的AI不只是檢查產品是否合規，也能協助企業判斷法規變動可能帶來哪些市場機會。\r\n\r\n【AI代理仍不能完全取代人員判斷】\r\n\r\n近年受到高度關注的AI代理，已能分解任務、搜尋資料與執行多步驟工作，但AI代理可能誤解背景、遺漏條件，或在資料不足時做出錯誤推論，因此仍需要適當的流程設計、風險限制與人員確認。較可行的方式，是讓AI處理大量資料整理、規則比對與方案推演，再由研發、法規與商業人員共同判斷。AI的角色較接近決策支援系統，而不是完全取代產品開發團隊。\r\n\r\nAI是否協助研發部門創造實際商業成果的衡量方式應包括：\r\n\r\n* 是否帶動營收\r\n* 是否改善產品毛利\r\n* 是否增加通路貨架空間\r\n* 是否降低上市後再次修改的比例\r\n* 是否開發出真正具有差異化的產品\r\n* 是否提高研發資源配置效率\r\n\r\n若AI只讓原有流程快一點，卻沒有提高產品成功率，企業仍然可能持續推出缺乏競爭力的商品。\r\n\r\n\r\n【調查說明】\r\n\r\n調查對象：美國與歐洲290位資深研發主管\r\n企業條件：員工人數1,000人以上，且從事食品及飲料配方開發與製造\r\n主要發現：\r\n\r\n* 91%已使用、試驗或擴大導入AI\r\n* 19%已將AI嵌入日常工作流程\r\n* 20%的AI計畫未正式執行\r\n* 14%導入後遭到放棄\r\n* 24%仍在使用，但商業效益有限\r\n* 57%認為生成式AI配方結果過於籠統\r\n* 52%的產品上市後一年內需要調整\r\n* 60%認為品牌與自有品牌品質差距縮小\r\n\r\n原文標題：AI is everywhere in CPG R&D. But is it moving the needle? Turing Labs surveys the biggest players\r\n原文連結：\r\nhttps://agfundernews.com/ai-is-everywhere-in-cpg-rd-but-is-it-moving-the-needle-turing-labs-surveys-the-biggest-players\r\n", "public_article_format": "text", "public_date": "2026-07-12", "published_date": "2026-06-16", "public_image_url": "", "topic": "F_冷鏈食安與農食供應鏈", "country": "國際", "language": "英文", "source_org": "AgFunder News", "title_original": "AI is everywhere in CPG R&D. But is it moving the needle? Turing Labs surveys the biggest players", "url": "https://agfundernews.com/ai-is-everywhere-in-cpg-rd-but-is-it-moving-the-needle-turing-labs-surveys-the-biggest-players"}, {"id": 59, "public_title": "德國 Stenon 募 1,800 萬歐元，以即時土壤氮素數據對抗肥料漲價", "public_summary": "德國農業科技公司 Stenon 完成 1,800 萬歐元（約 2,050 萬美元）B 輪募資，由荷蘭影響力投資機構 Pymwymic 領投，用於擴展其氮素與土壤數據管理平台。背景是…", "public_article": "全球肥料價格劇烈波動，農民愈來愈難掌握生產成本。德國農業科技公司Stenon近期完成1,800萬歐元、約2,050萬美元的B輪募資，準備擴大氮肥與土壤數據管理平台的市場布局。\r\n\r\n歐盟地區的氮肥價格已較2024年平均高出約70%，促使歐盟執委會提出5.4億歐元、約6.15億美元的農民紓困方案。高度依賴進口肥料的巴西，同樣面臨成本上升問題，包括磷酸二銨（DAP）及尿素等重要肥料，價格都受到國際市場牽動。部分巴西農民因價格過高而減少採購農業資材。投入量一旦下降，可能進一步影響施肥量、作物產量與農場收入。Stenon提出的解方，是讓農民能夠直接在田間取得更快速、更精細的氮素與土壤資料，依照實際狀況調整肥料施用。\r\n\r\n傳統土壤檢測多半依靠少數採樣點，再以平均值代表整塊田區。然而，即使在同一塊農地，不同位置的土壤肥力、含水量與有機質仍可能存在明顯差異。FarmLab能夠增加量測頻率與採樣密度，使農民更容易掌握田區內部的變化。而Stenon開發的FarmLab，是一套可攜式土壤分析設備，搭載光學及電學感測器。設備插入土壤後，能在數秒內量測多項資料，包括植物可利用態氮、土壤有機質、土壤溫度與含水量。透過軟體與人工智慧分析原始數據，將量測結果轉換為施肥管理建議，協助農民判斷肥料施用位置與用量。農民不必採集土壤樣本後送至實驗室，再等待數日或數週才能取得報告，而是能在田間即時取得數據，作為當下施肥與管理的參考。\r\n\r\nStenon的平台目前已進入美國加州、巴西、瑞士、奧地利、德國與希臘等國，應用於玉米、豆類、棉花、甘蔗、咖啡及穀物等作物，使用後的產量增幅約為2%至8%。以氮肥投入效益計算，平均投資報酬率約為20%至40%。\r\n\r\n面對肥料價格上漲，農民最直接的反應往往是減少施肥量，但全面減量未必能降低整體風險。作物在關鍵生育期若無法取得足夠養分，後續產量與品質損失可能高於節省下來的肥料成本。Stenon的發展方向顯示，精準施肥的重點正逐漸從「整塊農地應該施多少肥」，轉向「田區內哪些位置需要施肥，以及應該在什麼時間施用」。\r\n\r\n即時土壤檢測也開始從研究或顧問服務，逐步進入農民日常管理流程。當量測速度提高、操作程序簡化，土壤數據便有機會與施肥機械、田間管理紀錄及作物生長資料進一步整合。但這類技術能否普及，仍取決於設備成本、數據準確度、在地校正、操作便利性及實際投資效益。不過，在肥料價格與供應風險持續增加的環境下，如何讓每一公斤肥料發揮更高效益，已成為農場經營不可忽視的管理課題。\r\n\r\n\r\n#智慧農業 #精準施肥 #農業減碳\r\n\r\n\r\n原文標題：Stenon bags $20.5m to combat fertilizer price hikes with better nitrogen management\r\n原始網址：https://agfundernews.com/stenon-bags-20-5m-to-combat-fertilizer-price-hikes-with-better-nitrogen-management", "public_article_format": "text", "public_date": "2026-07-11", "published_date": "2026-07-01", "public_image_url": "", "topic": "A_智慧農業與資料治理", "country": "德國", "language": "英文", "source_org": "AgFunder News", "title_original": "Stenon bags $20.5m to combat fertilizer price hikes with better nitrogen management", "url": "https://agfundernews.com/stenon-bags-20-5m-to-combat-fertilizer-price-hikes-with-better-nitrogen-management"}, {"id": 72, "public_title": "果樹不能憑感覺修剪：苗木業者解析「疏枝」與「短截」的正確方法及使用時機", "public_summary": "日本農業媒體マイナビ農業「生產技術」專欄，由苗木業者說明果樹剪定中「切り戻し（回縮、疏刪）」與「切り返し（短截）」兩種剪法的原理與用法。", "public_article": "果樹修剪看似只是把過長或雜亂的枝條剪掉，實際上，每一次下剪都會影響後續枝條生長、樹冠採光、病蟲害風險，甚至開花與結果的位置。修剪方法雖然很多，首先需要分辨的，是「疏枝修剪」與「短截修剪」的差異。兩者下剪的位置不同，目的也完全不同。若沒有先想清楚希望留下什麼枝條、引導哪一個芽生長，隨意截斷枝條，反而可能造成傷口不易癒合、枝條枯死，或長出大量難以管理的徒長枝。\r\n\r\n【疏枝修剪】\r\n\r\n疏枝修剪是將枝條剪回枝條基部、枝條分岔處或與主幹連接的位置，不留下突出的殘枝。這種剪法不受枝齡限制，無論是一年生新梢或多年生老枝，只要判斷該枝條不需要保留，都可以從基部剪除。\r\n實務上，以下枝條通常會採用疏枝方式處理：\r\n\r\n* 樹冠內部過度密集、彼此交錯的枝條\r\n* 朝樹冠內側生長的內向枝\r\n* 向下垂落、妨礙管理的下垂枝\r\n* 已衰老、枯弱或生產力下降的枝條\r\n* 破壞預定樹形的枝條\r\n* 影響採光及通風的多餘枝條\r\n\r\n由於這種剪法能直接降低枝條數量，也常被稱為「間引修剪」。\r\n\r\n【短截修剪】\r\n\r\n短截修剪是在新梢或一年生枝的中段下剪，不將枝條整根剪回分岔處。這種剪法通常用於年輕枝條，主要目的不是減少枝條數，而是刺激剪口附近的芽萌發，增加新枝，或調整下一段枝條的生長方向。剪除枝條先端後，原本受到頂芽抑制的側芽較容易萌發。因此，短截修剪經常用於：\r\n\r\n* 增加枝條與葉片數量\r\n* 培養幼樹的骨架枝\r\n* 引導枝條向外或向特定方向生長\r\n* 促進當年生結果枝形成\r\n* 控制樹高並增加樹冠橫向發展\r\n\r\n二年生以上、已有一定粗度的枝條，原則上不應在中段任意鋸斷。粗枝從中間截斷後，切口面積較大，附近又未必有適當的分枝或芽點能持續輸送水分與養分，傷口通常較難癒合，也容易從剪口開始乾枯或腐朽。此外，粗枝遭到強度截短後，樹體常會在剪口周圍萌發多根生長旺盛的徒長枝。這些枝條直立、節間長，容易使樹冠重新變得混亂，後續管理反而更加困難。因此，短截修剪主要適用於一年生枝或仍然年輕、細小的新梢。若是較粗或較老的枝條，通常應尋找適當的分枝位置，以疏枝方式完整剪除，或剪回具有生長能力的側枝。\r\n\r\n【案例：利用兩種剪法降低酪梨樹高】\r\n\r\n設施栽培酪梨時，樹高往往是最棘手的管理問題之一。酪梨生長勢強，若長期不修剪，很快便可能長到二至三公尺以上。樹冠過高、過密後，光線難以進入內部，下層與內側枝條容易逐漸衰弱、枯死，也會增加病蟲害防治、授粉、採收與日常管理的難度。\r\n為控制設施內的樹高，可從幼樹階段便頻繁使用短截修剪，促使枝條橫向生長，再搭配疏枝修剪選留骨架枝，培養超低樹形。樹體高度降低後，枝葉總量及單株產量可能受到影響。不過，設施內若任由樹冠持續擴大，後續的採光、通風與病蟲害管理都會更加困難。因此，可選擇維持較低、較容易操作的樹形，再利用適度短截增加結果枝，使樹體保有一定的結果能力。\r\n\r\n這項原則並不限於酪梨。無論管理哪一種果樹，都應先決定希望培養的樹形，再依據目標選擇剪法。對樹形沒有幫助的枝條，應剪回枝條基部；希望促使新枝萌發時，則需確認芽的位置後進行短截。只要正確運用這兩種剪法，樹冠結構通常會更加穩定，樹體也較容易維持健康。\r\n\r\n【短截不是隨意把枝條剪短】\r\n\r\n短截修剪雖然是在一年生枝中段下剪，卻不代表可以選擇任意位置將枝條截斷。新枝只能從芽點萌發。如果剪口與保留芽之間距離過長，便會留下沒有生長用途的短小殘枝。這段枝條後續缺少芽與葉片拉動水分、養分，容易從剪口向下乾枯，嚴重時甚至可能枯到原本預定保留的芽附近。因此，即使採用短截修剪，也應像疏枝一樣，不留下過長、沒有用途的殘枝。\r\n\r\n正確做法是先決定希望保留哪一個芽，再於該芽上方不遠處下剪。如此一來，新梢可從預定芽點萌發，剪口周圍也較容易形成癒傷組織，使傷口逐漸封閉。\r\n\r\n【為什麼從分岔處剪除比較容易癒合】\r\n\r\n疏枝修剪是在枝條分岔處或枝條基部下剪。這些位置周圍仍有持續運作的枝幹組織，水分與養分流動較為活躍，因此較容易形成癒傷組織，傷口也比較容易封閉。相較之下，若在枝條中段任意截斷，剪口外側已沒有芽、葉片或枝條繼續生長，原本負責輸送水分與養分的部分組織失去作用，剪口附近較容易乾枯。\r\n尤其當剪口距離芽點太遠時，剪口與芽之間會留下一小段枝梢。這一段枝條沒有後續用途，也不容易維持活性，乾枯範圍可能逐漸向下延伸。短截修剪的基本原則，是在欲保留芽的上方留下一點安全距離後下剪。剪得太靠近，可能傷及芽體；距離太遠，又會留下容易乾枯的枝段。\r\n\r\n【剪口角度不必過斜】\r\n\r\n剪口角度同樣會影響傷口癒合。建議依照芽的位置，稍微以斜角下剪，使水分不容易停留在剪口表面，也讓剪口與芽點之間保持適當關係。不過，剪口並非愈斜愈好。斜度過大會增加傷口面積，反而延長癒合時間。只需略微傾斜，不必刻意削出過長的斜面。短截前應先決定「哪一個芽需要保留」，再確認剪口與芽的位置，使水分與養分能持續供應該芽。與其只注意剪刀應該落在哪裡，更重要的是理解剪後的枝條會朝哪個方向生長。\r\n\r\n【短截修剪的關鍵，在於留下哪一個芽】\r\n\r\n短截修剪不只會影響新枝數量，也能利用芽的位置調整枝條方向。枝條通常會朝保留芽所面向的方向生長。因此，希望枝條向樹冠外側展開時，應選擇外芽；不希望枝條繼續伸向樹冠中心，則應避免保留內芽。\r\n\r\n對採用開心形、低樹形管理的果樹而言，判斷芽的位置尤其重要。當樹冠內向枝持續增加，內部容易變得密集，陽光與空氣難以進入。長期下來，內側枝條可能衰弱或枯死，病蟲害發生機率也會提高，採收與田間操作都更加困難。幼樹培養低樹形時，通常會選擇朝外的芽，在外芽上方進行短截。新枝萌發後便會向外生長，使樹冠逐步向四周展開。\r\n\r\n若保留朝上或朝內的芽，長出的枝條往往直立、生長勢較強，容易形成徒長枝。徒長枝偏向營養生長，部分果樹也較不容易在這類枝條上形成花芽。因此，希望降低樹高或使枝條橫向發展時，不宜長期只保留朝上或朝內的芽。不過，內芽並非完全不能使用。當樹勢明顯衰弱，或需要在短時間內培養強壯枝條、恢復樹冠時，也可以刻意保留較直立的芽，利用其生長勢培養更新枝。\r\n\r\n短截修剪能透過芽的位置調整枝條方向與生長強弱。修剪後應持續觀察新枝的反應，逐步累積不同果樹、不同季節與不同樹勢下的管理經驗。\r\n\r\n【修剪的重點，是選擇留下什麼】\r\n\r\n果樹修剪與其說是「把枝條剪掉」，更接近選擇應該留下哪些枝條與芽。下剪前，應先想像修剪後樹體可能產生的反應：哪些芽會萌發、新枝會朝哪個方向生長、樹冠內部是否能獲得足夠光線，以及未來的結果枝應該分布在哪些位置。每一個剪口都應有明確目的，並與整體樹形相互配合。需要移除枝條時，從基部完整疏除；需要增加新枝或引導生長方向時，選定適當芽點後進行短截。掌握這兩種剪法的差異，修剪便不再只是憑經驗刪除枝條，而是有系統地安排樹體下一階段的生長。當修剪目的更清楚，果樹的採光、通風與管理效率也會逐步改善，樹形更穩定，後續栽培與採收也會輕鬆許多。\r\n\r\n\r\n原文標題：【図解】適当な剪定では果樹は育たない！  苗木屋が教える、科学的に正しい「切り戻し」と「切り返し」の方法と使い分け\r\n原始網址：https://agri.mynavi.jp/2026_07_10_543089/", "public_article_format": "text", "public_date": "2026-0 function home(){
  const intro = `<h1>國際農業科技情報</h1>
    <p class="lead">追蹤美國、日本、歐盟、韓國等地的智慧農業、氣候韌性、植物健康、森林經濟等發展，每週精選並轉譯為可讀的深度文章。本站為個人研究與內容經營用途。</p>
    <h2>最新公開文章</h2>`;
  const items = [...DATA].sort((a,b)=>(b.public_date||'').localeCompare(a.public_date||''));
  const preview = items.slice(0, 6);
  const more = items.length > 6 ? `<p style="text-align:center;margin:16px 0"><a class="tag" onclick="go('#/latest')">查看全部 ${items.length} 篇 →</a></p>` : '';
  return intro + (preview.length?preview.map(card).join(''):'<div class="empty">尚無已發布的公開文章。</div>') + more;
}
function topics(){
  const counts={}; DATA.forEach(a=>counts[a.topic]=(counts[a.topic]||0)+1);
  const cells = Object.keys(LABELS).map(k=>`<a class="card" style="display:block;text-decoration:none" onclick="go('#/topic/${encodeURIComponent(k)}')"><h3>${esc(LABELS[k])}</h3><div class="meta">${counts[k]||0} 篇已公開</div></a>`).join('');
  return `<h1>主題分類</h1><div class="grid">${cells}</div>`;
}
function article(id){
  const a = DATA.find(x=>String(x.id)===String(id));
  if(!a) return '<div class="empty">找不到這篇公開文章。</div>';
  const tags = `<a class="tag" onclick="go('#/topic/${encodeURIComponent(a.topic)}')">${esc(label(a.topic))}</a><a class="tag" onclick="go('#/country/${encodeURIComponent(a.country)}')">${esc(a.country)}</a>`;
  const hero = a.public_image_url?`<a href="${esc(a.public_image_url)}" target="_blank" rel="noopener noreferrer"><img class="hero" src="${esc(a.public_image_url)}" alt="${esc(a.public_title)}" loading="lazy" referrerpolicy="no-referrer"></a>`:'';
  // public_article_format='html' 時 DB 內容已在後台存檔時經白名單過濾，這裡直接信任輸出，不再跳脫
  const body = a.public_article_format==='html' ? `<div class="article-html">${a.public_article}</div>` : `<p>${esc(a.public_article)}</p>`;
  return `<article class="article"><h1>${esc(a.public_title)}</h1>
    <div class="meta"><span>發布日 ${esc(a.public_date)}</span><span>原文語言：${esc(a.language)}</span><span>來源機構：${esc(a.source_org)}</span>${tags}</div>
    ${hero}${body}
    <div class="src"><strong>原始資料來源</strong><br>原文標題：${esc(a.title_original)}<br>
    原始網址：<a href="${esc(a.url)}" target="_blank" rel="noopener nofollow">${esc(a.url)}</a><br>
    發布日期：${esc(a.published_date)}</div></article>`;
}
function render(){
  const h = location.hash || '#/';
  const app = document.getElementById('app');
  let out;
  if(h.startsWith('#/article/')) out = article(decodeURIComponent(h.split('/')[2]));
  else if(h.startsWith('#/topic/')){ const t=decodeURIComponent(h.split('/')[2]); out=listView(label(t), DATA.filter(a=>a.topic===t)); }
  else if(h.startsWith('#/country/')){ const c=decodeURIComponent(h.split('/')[2]); out=listView(c, DATA.filter(a=>a.country===c)); }
  else if(h.startsWith('#/search')){ const q=decodeURIComponent((h.split('?q=')[1]||'')); const ql=q.toLowerCase();
    out=listView('搜尋：'+q, DATA.filter(a=>((a.public_title||'')+(a.public_summary||'')+(a.public_article||'')).toLowerCase().includes(ql)), `找到 ${DATA.filter(a=>((a.public_title||'')+(a.public_summary||'')+(a.public_article||'')).toLowerCase().includes(ql)).length} 篇`); }
  else if(h==='#/latest') out = listView('文章總覽', [...DATA].sort((a,b)=>(b.public_date||'').localeCompare(a.public_date||'')));
  else if(h==='#/topics') out = topics();
  else out = home();
  app.innerHTML = out; window.scrollTo(0,0);
}
function doSearch(e){ e.preventDefault(); go('#/search?q='+encodeURIComponent(document.getElementById('q').value.trim())); return false; }
window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
